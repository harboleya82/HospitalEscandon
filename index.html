<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Encuesta Hospital Escandón</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;min-height:-webkit-fill-available}
html{height:-webkit-fill-available}

.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0c4a6e,#0369a1);padding:14px 16px 10px;box-shadow:0 2px 12px rgba(12,74,110,.3)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;letter-spacing:1px}
.logo-title{color:#fff;font-weight:700;font-size:15px}
.logo-sub{color:rgba(255,255,255,.7);font-size:11px}
.menu-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#10b981);border-radius:4px;transition:width .4s ease}
.progress-text{color:rgba(255,255,255,.8);font-size:12px;font-weight:600;min-width:36px;text-align:right}

.nav-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200}
.nav-overlay.open{display:flex;justify-content:flex-end}
.nav-panel{width:280px;max-width:80vw;background:#fff;height:100%;padding:20px 12px;overflow-y:auto}
.nav-title{font-size:16px;font-weight:700;color:#0c4a6e;margin-bottom:12px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-bottom:4px;font-family:inherit;background:transparent;color:#374151;text-align:left}
.nav-item.active{background:#0c4a6e;color:#fff}
.nav-item .check{margin-left:auto;color:#10b981;font-size:14px}
.nav-item.active .check{color:#a7f3d0}

.content{padding:0 16px 120px}
.section-header{text-align:center;padding:24px 0 16px}
.section-icon{font-size:36px}
.section-title{font-size:22px;font-weight:800;color:#0c4a6e;margin:8px 0 0;letter-spacing:-.3px}
.deep-note{margin-top:8px;font-size:13px;color:#059669;background:#ecfdf5;padding:8px 12px;border-radius:8px;line-height:1.5}

.section{display:none}
.section.active{display:block}

.card{background:#fff;border-radius:16px;padding:18px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative}
.q-num{position:absolute;top:-8px;left:12px;width:26px;height:26px;border-radius:50%;background:#0c4a6e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.q-text{font-size:15px;font-weight:600;color:#1e293b;line-height:1.55;margin:4px 0 14px;white-space:pre-line}

.opts{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;font-family:inherit;text-align:left;width:100%;font-size:14px;color:#334155;transition:all .15s ease;line-height:1.4}
.opt-btn:active{transform:scale(.98)}
.opt-btn.selected{border-color:#0c4a6e;background:#f0f9ff}
.radio-circle{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.opt-btn.selected .radio-circle{border-color:#0c4a6e;background:#0c4a6e}
.radio-dot{width:8px;height:8px;border-radius:50%;background:#fff;display:none}
.opt-btn.selected .radio-dot{display:block}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:transparent;font-size:12px}
.opt-btn.selected .check-box{border-color:#0c4a6e;background:#0c4a6e;color:#fff}
.max-note{font-size:12px;color:#9ca3af;font-style:italic;margin-bottom:4px}
.other-input{margin-left:34px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:#1e293b;width:calc(100% - 34px);display:none}
.other-input.visible{display:block;margin-top:8px}

.likert-wrap{padding:4px 0}
.likert-labels{display:flex;justify-content:space-between;margin-bottom:8px}
.likert-end{font-size:11px;color:#9ca3af;font-weight:500}
.likert-btns{display:flex;justify-content:space-between;gap:6px}
.l-btn{flex:1;min-width:44px;height:48px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;font-size:18px;font-weight:700;color:#64748b;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:inherit}
.l-btn:active{transform:scale(.95)}
.l-btn.selected{background:#0c4a6e;color:#fff;border-color:#0c4a6e;transform:scale(1.08);box-shadow:0 4px 12px rgba(12,74,110,.3)}
.likert-subs{display:flex;justify-content:space-between;margin-top:6px}
.likert-sub{font-size:9px;color:#b0b8c4;text-align:center;flex:1;line-height:1.3}

.l-btn.color-1.selected{background:#ef4444;border-color:#ef4444}
.l-btn.color-2.selected{background:#f97316;border-color:#f97316}
.l-btn.color-3.selected{background:#eab308;border-color:#eab308}
.l-btn.color-4.selected{background:#22c55e;border-color:#22c55e}
.l-btn.color-5.selected{background:#0ea5e9;border-color:#0ea5e9}

.scale10-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.s10-btn{width:52px;height:48px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;font-size:18px;font-weight:700;color:#64748b;cursor:pointer;transition:all .15s;font-family:inherit}
.s10-btn:active{transform:scale(.95)}
.s10-btn.selected{color:#fff;transform:scale(1.1);box-shadow:0 4px 10px rgba(0,0,0,.15)}

input[type="number"]{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:18px;font-weight:600;font-family:inherit;outline:none;color:#0c4a6e;text-align:center;-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:inherit;outline:none;color:#1e293b;resize:vertical;min-height:80px;line-height:1.5}
textarea.tall{min-height:120px}
input:focus,textarea:focus{border-color:#0c4a6e;box-shadow:0 0 0 3px rgba(12,74,110,.1)}

.footer{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px;background:#fff;border-top:1px solid #e2e8f0;z-index:100;max-width:100%}
.f-btn{flex:1;padding:14px 16px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;font-size:15px;font-weight:600;color:#475569;cursor:pointer;font-family:inherit}
.f-btn:active{transform:scale(.97)}
.f-btn:disabled{opacity:.4}
.f-btn-primary{background:linear-gradient(135deg,#0c4a6e,#0369a1);color:#fff;border:none}
.f-btn-submit{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none}

.thank-you{display:none;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center;min-height:80vh}
.thank-you.active{display:flex}
.thank-icon{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-size:40px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 8px 24px rgba(16,185,129,.3)}
.thank-title{font-size:24px;font-weight:800;color:#0c4a6e;margin-bottom:16px}
.thank-text{font-size:15px;color:#64748b;line-height:1.6;max-width:320px;margin-bottom:24px}
.thank-badge{padding:16px 32px;background:#f0f9ff;border-radius:16px;display:flex;flex-direction:column;gap:4px;align-items:center;margin-bottom:20px}
.thank-badge .count{font-size:28px;font-weight:700;color:#0c4a6e}
.thank-badge .label{font-size:13px;color:#6b7280}

.export-btn{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.export-btn:active{transform:scale(.97)}
.export-csv{padding:12px 28px;border-radius:12px;border:2px solid #e2e8f0;background:#fff;color:#475569;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}

.results-preview{margin-top:20px;background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);max-width:360px;width:100%;text-align:left;max-height:300px;overflow-y:auto;font-size:12px;color:#64748b;line-height:1.6}
.results-preview strong{color:#0c4a6e}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-mark">HE</div>
      <div>
        <div class="logo-title">Hospital Escandón</div>
        <div class="logo-sub">Cuestionario Diagnóstico</div>
      </div>
    </div>
    <button class="menu-btn" onclick="toggleNav()">☰</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText"></span>
  </div>
</div>

<div class="nav-overlay" id="navOverlay" onclick="toggleNav()">
  <div class="nav-panel" onclick="event.stopPropagation()">
    <div class="nav-title">Secciones</div>
    <div id="navItems"></div>
  </div>
</div>

<div class="content" id="contentArea"></div>

<div class="thank-you" id="thankYou">
  <div class="thank-icon">✓</div>
  <div class="thank-title">¡Gracias por su participación!</div>
  <div class="thank-text">Sus respuestas contribuirán directamente a mejorar las condiciones de su práctica profesional y la experiencia de sus pacientes.</div>
  <div class="thank-badge">
    <span class="label">Respuestas registradas</span>
    <span class="count" id="answerCount">0</span>
  </div>
  <button class="export-btn" onclick="exportJSON()">📋 Copiar respuestas al portapapeles</button>
  <button class="export-csv" onclick="exportCSV()">📄 Descargar como CSV</button>
  <div class="results-preview" id="resultsPreview"></div>
</div>

<div class="footer" id="footerNav">
  <button class="f-btn" id="btnPrev" onclick="prevSection()" disabled>← Anterior</button>
  <button class="f-btn f-btn-primary" id="btnNext" onclick="nextSection()">Siguiente →</button>
</div>

<script>
const SECTIONS = [
  { id:"consent", title:"Bienvenido(a)", icon:"🏥", questions:[
    {id:"consent",type:"single",text:"Este cuestionario es estrictamente confidencial y anónimo. Sus respuestas serán analizadas de forma agregada.\n\n¿Acepta participar voluntariamente?",options:["Sí, acepto","No acepto"]}
  ]},
  { id:"profile", title:"Perfil del Médico", icon:"👤", questions:[
    {id:"p1_1",type:"open",text:"¿Cuál es su especialidad médico-quirúrgica principal?",ph:"Ej. Cirugía General, Traumatología..."},
    {id:"p1_2",type:"single",text:"¿Cuántos años tiene adscrito al Hospital Escandón?",options:["Menos de 1 año","1–3 años","4–7 años","8–15 años","Más de 15 años"]},
    {id:"p1_3",type:"single",text:"¿En cuántos hospitales o clínicas (además de Hospital Escandón) realiza cirugías actualmente?",options:["Ninguno","1","2","3 o más"]},
    {id:"p1_4",type:"single",text:"¿Qué porcentaje aproximado de su práctica quirúrgica total realiza en Hospital Escandón?",options:["Menos del 25%","25–50%","51–75%","Más del 75%"]},
    {id:"p1_5",type:"single",text:"¿Cuenta con consultorio dentro del Hospital Escandón?",options:["Sí, de tiempo completo","Sí, compartido","No, consulto en otro lugar"]}
  ]},
  { id:"surgical", title:"Comportamiento Quirúrgico", icon:"🔬", questions:[
    {id:"p2_1",type:"number",text:"¿Cuántas cirugías programa usted en promedio al mes EN TOTAL (en todos los hospitales)?",ph:"Número de cirugías"},
    {id:"p2_2",type:"number",text:"¿Cuántas de esas cirugías realiza específicamente en Hospital Escandón?",ph:"Número de cirugías"},
    {id:"p2_3",type:"multi",text:"¿Cuáles son las principales razones por las que programa cirugías en otros hospitales? (Seleccione todas las que apliquen)",options:["Costo de renta de quirófano más competitivo","Disponibilidad de equipo especializado","Mis pacientes prefieren otro hospital","Comodidad/cercanía para mí","Mejor experiencia postoperatoria para el paciente","Convenios con aseguradoras más ágiles","Costumbre / inercia"],hasOther:true},
    {id:"p2_4",type:"single",text:"¿Ha tenido pacientes que planeaba operar en Hospital Escandón pero terminó operándolos en otro lugar?",options:["Nunca","Ocasionalmente (1–2/año)","Con frecuencia (3+/año)"]},
    {id:"p2_5",type:"open",text:"Si respondió \"ocasionalmente\" o \"con frecuencia\", ¿cuál fue la razón principal?",ph:"Describa la razón..."},
    {id:"p2_6",type:"multi",text:"¿En qué días y horarios prefiere programar sus cirugías?",options:["Lunes a viernes matutino (7–14h)","Lunes a viernes vespertino (14–21h)","Sábado","Me es indiferente"]}
  ]},
  { id:"perception", title:"Percepción del Hospital", icon:"⭐", questions:[
    {id:"p3_1",type:"likert",text:"Hospital Escandón tiene una reputación sólida entre mis colegas médicos."},
    {id:"p3_2",type:"likert",text:"La relación calidad-precio de los servicios hospitalarios es competitiva."},
    {id:"p3_3",type:"likert",text:"El hospital tiene la infraestructura adecuada para procedimientos de alta complejidad."},
    {id:"p3_4",type:"likert",text:"Recomiendo activamente a Hospital Escandón a otros médicos."},
    {id:"p3_5",type:"likert",text:"Mis pacientes expresan satisfacción con su estancia en el hospital."},
    {id:"p3_6",type:"likert",text:"El hospital está a la altura de las clínicas de corta estancia en cuanto a conveniencia."},
    {id:"p3_7",type:"open",text:"Si un colega le pidiera una opinión sincera sobre operar en Hospital Escandón, ¿qué le diría en una frase?",ph:"Su opinión sincera..."}
  ]},
  { id:"or_exp", title:"Experiencia en Quirófano", icon:"🏗️", questions:[
    {id:"p4_1",type:"likert5",text:"Disponibilidad de horarios de quirófano cuando los necesito."},
    {id:"p4_2",type:"likert5",text:"Estado y mantenimiento del equipo quirúrgico."},
    {id:"p4_3",type:"likert5",text:"Disponibilidad de equipo especializado (torre laparoscópica, arco en C, bisturí armónico, etc.)."},
    {id:"p4_4",type:"likert5",text:"Calidad del equipo de enfermería quirúrgica e instrumentistas."},
    {id:"p4_5",type:"likert5",text:"Tiempo de rotación entre cirugías (limpieza, preparación de sala)."},
    {id:"p4_6",type:"likert5",text:"Servicio de anestesiología."},
    {id:"p4_7",type:"likert5",text:"Proceso de programación quirúrgica (agilidad administrativa)."},
    {id:"p4_8",type:"likert5",text:"Disponibilidad de insumos y materiales de curación."},
    {id:"p4_9",type:"single",text:"¿Ha cancelado o reprogramado alguna cirugía por motivos atribuibles al hospital?",options:["Nunca","1–2 veces en el último año","3 o más veces"]},
    {id:"p4_10",type:"open",text:"¿Qué equipo o tecnología considera indispensable que el hospital adquiera o renueve?",ph:"Equipo o tecnología necesaria..."}
  ]},
  { id:"hospitality", title:"Hotelería Hospitalaria", icon:"🛏️", questions:[
    {id:"p5_1",type:"likert5",text:"Comodidad y estado de las habitaciones."},
    {id:"p5_2",type:"likert5",text:"Limpieza y mantenimiento general del área de hospitalización."},
    {id:"p5_3",type:"likert5",text:"Calidad del servicio de enfermería en piso."},
    {id:"p5_4",type:"likert5",text:"Calidad y presentación de los alimentos para pacientes."},
    {id:"p5_5",type:"likert5",text:"Atención y comodidad para los familiares del paciente."},
    {id:"p5_6",type:"likert5",text:"Proceso de admisión y alta (tiempos, claridad, calidez)."},
    {id:"p5_7",type:"likert5",text:"Imagen general del hospital (fachada, señalización, áreas comunes)."},
    {id:"p5_8",type:"single",text:"¿Algún paciente suyo le ha expresado incomodidad o insatisfacción con alguno de los aspectos anteriores?",options:["Nunca","Alguna vez","Con frecuencia"]},
    {id:"p5_9",type:"multi",text:"Si respondió \"alguna vez\" o \"con frecuencia\", ¿qué aspecto mencionaron más?",options:["Habitación (espacio, mobiliario, baño)","Alimentación","Trato de enfermería","Limpieza","Atención a familiares","Tiempos de espera (admisión/alta)"],hasOther:true},
    {id:"p5_10",type:"single",text:"¿Considera que la experiencia de hotelería del hospital ha influido en que algún paciente suyo haya preferido operarse en otra institución?",options:["Definitivamente no","Probablemente no","Probablemente sí","Definitivamente sí"]},
    {id:"p5_11",type:"open",text:"¿Qué mejora específica en la experiencia del paciente tendría el mayor impacto para que usted se sienta más seguro recomendando una estancia en Hospital Escandón?",ph:"Su recomendación..."}
  ]},
  { id:"barriers", title:"Barreras Operativas", icon:"⚙️", questions:[
    {id:"p6_1",type:"likert",text:"Los procesos administrativos para programar una cirugía son ágiles y claros."},
    {id:"p6_2",type:"likert",text:"La comunicación con el área de programación quirúrgica es eficiente."},
    {id:"p6_3",type:"likert",text:"El proceso de autorización con aseguradoras fluye sin complicaciones."},
    {id:"p6_4",type:"likert",text:"Los costos de renta de quirófano, insumos y materiales me parecen competitivos."},
    {id:"p6_5",type:"likert",text:"Me siento respaldado por la Dirección cuando surgen complicaciones."},
    {id:"p6_6",type:"likert",text:"La disponibilidad de Banco de Sangre y servicios auxiliares es confiable."},
    {id:"p6_7",type:"open",text:"¿Cuál es la barrera administrativa más frustrante que enfrenta al operar en Hospital Escandón?",ph:"Describa la barrera..."},
    {id:"p6_8",type:"open",text:"Si pudiera cambiar UN proceso del hospital para facilitar su práctica quirúrgica, ¿cuál sería?",ph:"El cambio más importante..."}
  ]},
  { id:"competition", title:"Competencia", icon:"📊", questions:[
    {id:"p7_1",type:"multi",text:"Además de Hospital Escandón, ¿en qué tipo de institución realiza cirugías?",options:["Clínica de corta estancia","Hospital privado grande","Hospital privado pequeño/mediano","Hospital público (IMSS, ISSSTE, SSA)","No opero en otro lugar"]},
    {id:"p7_2",type:"open",text:"¿Qué ventaja principal le ofrece esa otra institución que Hospital Escandón no le ofrece actualmente?",ph:"Ventaja principal..."},
    {id:"p7_3",type:"scale10",text:"En una escala del 1 al 10, ¿qué tan probable es que en los próximos 12 meses aumente el número de cirugías que realiza en Hospital Escandón?"},
    {id:"p7_4",type:"open",text:"¿Qué necesitaría Hospital Escandón ofrecerle para que traslade más cirugías aquí?",ph:"Lo que necesitaría..."}
  ]},
  { id:"incentives", title:"Incentivos", icon:"💡", questions:[
    {id:"p8_1",type:"single",text:"¿Qué tan importante es para usted el costo de renta de quirófano al elegir dónde operar?",options:["Es el factor decisivo","Muy importante","Importante pero no determinante","Poco relevante"]},
    {id:"p8_2",type:"multi",text:"¿Cuál de los siguientes incentivos le resultaría más atractivo? (Máximo 2)",options:["Descuento en renta de quirófano por volumen","Tarifa preferencial vespertinos/fines de semana","Paquetes quirúrgicos cerrados más competitivos","Facilidades de pago a MSI para pacientes","Apoyo en gestión con aseguradoras","Acceso prioritario a equipo especializado"],hasOther:true,max:2},
    {id:"p8_3",type:"single",text:"¿Conoce los paquetes quirúrgicos que ofrece actualmente Hospital Escandón?",options:["Sí, y los ofrezco a mis pacientes","Sí, pero no los uso","No los conozco"]},
    {id:"p8_4",type:"open",text:"Si respondió \"Sí, pero no los uso\", ¿por qué motivo?",ph:"Motivo..."}
  ]},
  { id:"opportunities", title:"Oportunidades", icon:"🚀", questions:[
    {id:"p9_1",type:"open",text:"¿Qué servicio o especialidad considera que el hospital debería fortalecer para atraer más pacientes quirúrgicos a la zona Tacubaya/Escandón?",ph:"Servicio o especialidad..."},
    {id:"p9_2",type:"single",text:"Si Hospital Escandón implementara UN cambio importante en los próximos 6 meses, ¿cuál le generaría mayor impacto?",options:["Mejorar habitaciones y hotelería","Adquirir equipo quirúrgico de última generación","Reducir costos de renta y materiales","Agilizar procesos administrativos","Mejorar el marketing e imagen pública"],hasOther:true},
    {id:"p9_3",type:"single",text:"¿Estaría dispuesto(a) a participar en una jornada quirúrgica mensual con tarifas especiales dirigida a pacientes de escasos recursos?",options:["Sí, con mucho interés","Sí, bajo ciertas condiciones","No me interesa"]}
  ]},
  { id:"deep", title:"Preguntas de Profundidad", icon:"🔍", questions:[
    {id:"deep_1",type:"open_long",text:"Imagínese que un paciente suyo necesita una cirugía programada mañana. Describa, paso a paso, cómo decide en qué hospital operarlo. ¿Qué pesa más en esa decisión?",ph:"Describa su proceso de decisión..."},
    {id:"deep_2",type:"open_long",text:"Si pudiera diseñar el hospital ideal para su práctica quirúrgica (sin limitaciones de presupuesto), ¿qué tres cosas tendría que Hospital Escandón no tiene hoy?",ph:"1.\n2.\n3."},
    {id:"deep_3",type:"open_long",text:"Piense en la última vez que un paciente le dijo que prefería operarse en otro lugar. ¿Qué razón le dio? ¿Usted compartió esa opinión internamente?",ph:"Describa la situación..."},
    {id:"deep_4",type:"open_long",text:"¿Hay algo que Hospital Escandón hace bien y que las clínicas de corta estancia NO pueden replicar? ¿Qué es?",ph:"Ventajas únicas del hospital..."},
    {id:"deep_5",type:"open_long",text:"Sea completamente honesto: si mañana usted necesitara una cirugía para un familiar cercano, ¿la realizaría en Hospital Escandón? ¿Por qué sí o por qué no?",ph:"Su respuesta honesta..."}
  ]}
];

let currentSection = 0;
const answers = {};

function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>')}

function buildSections(){
  const c = document.getElementById('contentArea');
  c.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    let h = `<div class="section${si===0?' active':''}" id="sec_${si}">`;
    h += `<div class="section-header"><span class="section-icon">${sec.icon}</span><h2 class="section-title">${esc(sec.title)}</h2>`;
    if(sec.id==='deep') h += `<p class="deep-note">Las siguientes preguntas son las más valiosas. Le pedimos total honestidad; recuerde que es anónimo.</p>`;
    h += `</div>`;

    sec.questions.forEach((q, qi) => {
      h += `<div class="card"><div class="q-num">${qi+1}</div><p class="q-text">${esc(q.text)}</p>`;

      if(q.type==='single'){
        h += `<div class="opts">`;
        q.options.forEach(opt => {
          h += `<button class="opt-btn" data-qid="${q.id}" data-val="${esc(opt)}" onclick="selectSingle(this)"><div class="radio-circle"><div class="radio-dot"></div></div><span>${esc(opt)}</span></button>`;
        });
        if(q.hasOther){
          h += `<button class="opt-btn" data-qid="${q.id}" data-val="__other__" onclick="selectSingle(this)"><div class="radio-circle"><div class="radio-dot"></div></div><span>Otro</span></button>`;
          h += `<input class="other-input" id="other_${q.id}" placeholder="Especifique..." oninput="answers['${q.id}_other']=this.value">`;
        }
        h += `</div>`;
      }

      if(q.type==='multi'){
        h += `<div class="opts">`;
        if(q.max) h += `<p class="max-note">Seleccione máximo ${q.max}</p>`;
        q.options.forEach(opt => {
          h += `<button class="opt-btn" data-qid="${q.id}" data-val="${esc(opt)}" data-max="${q.max||0}" onclick="toggleMulti(this)"><div class="check-box">✓</div><span>${esc(opt)}</span></button>`;
        });
        if(q.hasOther){
          h += `<button class="opt-btn" data-qid="${q.id}" data-val="__other__" data-max="${q.max||0}" onclick="toggleMulti(this)"><div class="check-box">✓</div><span>Otro</span></button>`;
          h += `<input class="other-input" id="other_${q.id}" placeholder="Especifique..." oninput="answers['${q.id}_other']=this.value">`;
        }
        h += `</div>`;
      }

      if(q.type==='likert'){
        h += `<div class="likert-wrap"><div class="likert-labels"><span class="likert-end">Muy en desacuerdo</span><span class="likert-end">Muy de acuerdo</span></div><div class="likert-btns">`;
        for(let n=1;n<=5;n++) h += `<button class="l-btn" data-qid="${q.id}" data-val="${n}" onclick="selectLikert(this)">${n}</button>`;
        h += `</div><div class="likert-subs"><span class="likert-sub">Muy en<br>desacuerdo</span><span class="likert-sub">En<br>desacuerdo</span><span class="likert-sub">Neutral</span><span class="likert-sub">De<br>acuerdo</span><span class="likert-sub">Muy de<br>acuerdo</span></div></div>`;
      }

      if(q.type==='likert5'){
        h += `<div class="likert-wrap"><div class="likert-labels"><span class="likert-end">Muy deficiente</span><span class="likert-end">Excelente</span></div><div class="likert-btns">`;
        for(let n=1;n<=5;n++) h += `<button class="l-btn color-${n}" data-qid="${q.id}" data-val="${n}" onclick="selectLikert(this)">${n}</button>`;
        h += `</div><div class="likert-subs"><span class="likert-sub">Muy<br>deficiente</span><span class="likert-sub">Deficiente</span><span class="likert-sub">Aceptable</span><span class="likert-sub">Bueno</span><span class="likert-sub">Excelente</span></div></div>`;
      }

      if(q.type==='scale10'){
        h += `<div class="likert-wrap"><div class="likert-labels"><span class="likert-end">Nada probable</span><span class="likert-end">Muy probable</span></div><div class="scale10-wrap">`;
        for(let n=1;n<=10;n++){
          const hue = Math.round(((n-1)/9)*120);
          h += `<button class="s10-btn" data-qid="${q.id}" data-val="${n}" data-hue="${hue}" onclick="selectScale10(this)">${n}</button>`;
        }
        h += `</div></div>`;
      }

      if(q.type==='number'){
        h += `<input type="number" inputmode="numeric" placeholder="${q.ph||''}" oninput="answers['${q.id}']=this.value">`;
      }

      if(q.type==='open'){
        h += `<textarea placeholder="${q.ph||''}" oninput="answers['${q.id}']=this.value"></textarea>`;
      }

      if(q.type==='open_long'){
        h += `<textarea class="tall" placeholder="${q.ph||''}" oninput="answers['${q.id}']=this.value"></textarea>`;
      }

      h += `</div>`;
    });
    h += `</div>`;
    c.innerHTML += h;
  });
  updateUI();
}

function selectSingle(btn){
  const qid = btn.dataset.qid;
  const val = btn.dataset.val;
  answers[qid] = val;
  btn.closest('.opts').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const oi = document.getElementById('other_'+qid);
  if(oi) oi.classList.toggle('visible', val==='__other__');
}

function toggleMulti(btn){
  const qid = btn.dataset.qid;
  const val = btn.dataset.val;
  const max = parseInt(btn.dataset.max)||0;
  if(!answers[qid]) answers[qid] = [];
  const idx = answers[qid].indexOf(val);
  if(idx > -1){
    answers[qid].splice(idx,1);
    btn.classList.remove('selected');
  } else {
    if(max && answers[qid].length >= max) return;
    answers[qid].push(val);
    btn.classList.add('selected');
  }
  const oi = document.getElementById('other_'+qid);
  if(oi) oi.classList.toggle('visible', answers[qid].includes('__other__'));
}

function selectLikert(btn){
  const qid = btn.dataset.qid;
  answers[qid] = parseInt(btn.dataset.val);
  btn.closest('.likert-btns').querySelectorAll('.l-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function selectScale10(btn){
  const qid = btn.dataset.qid;
  const val = parseInt(btn.dataset.val);
  const hue = btn.dataset.hue;
  answers[qid] = val;
  btn.closest('.scale10-wrap').querySelectorAll('.s10-btn').forEach(b => {
    b.classList.remove('selected');
    b.style.background='';b.style.borderColor='';b.style.color='';
  });
  btn.classList.add('selected');
  btn.style.background = `hsl(${hue},70%,45%)`;
  btn.style.borderColor = `hsl(${hue},70%,45%)`;
  btn.style.color = '#fff';
}

function showSection(idx){
  currentSection = idx;
  document.querySelectorAll('.section').forEach((s,i) => s.classList.toggle('active', i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
  updateUI();
}

function nextSection(){
  if(currentSection < SECTIONS.length - 1) showSection(currentSection + 1);
  else submitSurvey();
}

function prevSection(){
  if(currentSection > 0) showSection(currentSection - 1);
}

function updateUI(){
  const total = SECTIONS.length;
  document.getElementById('progressFill').style.width = ((currentSection+1)/total*100)+'%';
  document.getElementById('progressText').textContent = (currentSection+1)+'/'+total;
  document.getElementById('btnPrev').disabled = currentSection === 0;
  const btnNext = document.getElementById('btnNext');
  if(currentSection === total - 1){
    btnNext.textContent = 'Enviar ✓';
    btnNext.className = 'f-btn f-btn-submit';
  } else {
    btnNext.textContent = 'Siguiente →';
    btnNext.className = 'f-btn f-btn-primary';
  }
  buildNav();
}

function buildNav(){
  const c = document.getElementById('navItems');
  c.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const active = i === currentSection ? ' active' : '';
    c.innerHTML += `<button class="nav-item${active}" onclick="showSection(${i});toggleNav()"><span>${s.icon}</span><span style="flex:1;text-align:left">${s.title}</span></button>`;
  });
}

function toggleNav(){
  document.getElementById('navOverlay').classList.toggle('open');
}

function submitSurvey(){
  document.getElementById('contentArea').style.display = 'none';
  document.getElementById('footerNav').style.display = 'none';
  document.getElementById('header')
  document.querySelector('.header').style.display = 'none';
  const ty = document.getElementById('thankYou');
  ty.classList.add('active');

  const count = Object.keys(answers).filter(k => {
    const v = answers[k];
    if(v === undefined || v === null || v === '') return false;
    if(Array.isArray(v) && v.length === 0) return false;
    return true;
  }).length;
  document.getElementById('answerCount').textContent = count;

  let preview = '';
  SECTIONS.forEach(sec => {
    preview += `<strong>${sec.title}</strong><br>`;
    sec.questions.forEach(q => {
      const a = answers[q.id];
      if(a !== undefined && a !== '' && a !== null && !(Array.isArray(a) && a.length===0)){
        let display = Array.isArray(a) ? a.join(', ') : a;
        if(answers[q.id+'_other']) display += ' → ' + answers[q.id+'_other'];
        preview += `${q.id}: ${display}<br>`;
      }
    });
    preview += '<br>';
  });
  document.getElementById('resultsPreview').innerHTML = preview;
}

function getExportData(){
  const data = {fecha: new Date().toISOString().split('T')[0], respuestas:{}};
  SECTIONS.forEach(sec => {
    sec.questions.forEach(q => {
      if(answers[q.id] !== undefined){
        let val = answers[q.id];
        if(answers[q.id+'_other']) val = (Array.isArray(val) ? [...val.filter(v=>v!=='__other__'), answers[q.id+'_other']] : answers[q.id+'_other']);
        data.respuestas[q.id] = val;
      }
    });
  });
  return data;
}

function exportJSON(){
  const data = getExportData();
  const text = JSON.stringify(data, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => alert('✅ Respuestas copiadas al portapapeles.\n\nPuede pegarlas en un correo o documento.'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ Respuestas copiadas al portapapeles.');
  }
}

function exportCSV(){
  const data = getExportData();
  let csv = 'Pregunta,Respuesta\n';
  for(const [k,v] of Object.entries(data.respuestas)){
    const val = Array.isArray(v) ? v.join('; ') : String(v).replace(/"/g,'""');
    csv += `"${k}","${val}"\n`;
  }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'encuesta_hospital_escandon_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

buildSections();
</script>
</body>
</html>
