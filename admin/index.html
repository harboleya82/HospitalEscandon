<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Escandón | Dashboard Ejecutivo Médico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root{--esc-50:#F0F5F3;--esc-100:#DDECE7;--esc-200:#BBD6CB;--esc-300:#8FBCAE;--esc-500:#438070;--esc-600:#2F6557;--esc-800:#154135;--esc-900:#0B2D24;--esc-950:#061A14;--gold-50:#FAF8F3;--gold-400:#BDA46D;--gold-500:#AA8A4A;--gold-600:#92713A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F8FAF9;color:#1F2937;-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#DDECE7;border-radius:10px}
.premium-card{background:#fff;border-radius:1.25rem;box-shadow:0 4px 40px -8px rgba(21,65,53,.06),0 2px 10px -2px rgba(21,65,53,.03);border:1px solid rgba(21,65,53,.05);transition:transform .2s,box-shadow .2s}
.premium-card:hover{box-shadow:0 8px 50px -10px rgba(21,65,53,.1);transform:translateY(-2px)}
.hero-bg{position:absolute;top:0;left:0;width:100%;height:360px;background:var(--esc-900);z-index:0;overflow:hidden}
.hero-bg::before{content:'';position:absolute;top:-20%;left:-10%;width:50%;height:150%;background:var(--esc-800);border-radius:50%;filter:blur(120px);opacity:.6}
.hero-bg::after{content:'';position:absolute;bottom:-50%;right:-10%;width:60%;height:150%;background:var(--esc-950);border-radius:50%;filter:blur(100px);opacity:.8}
.fade-in{opacity:0;transform:translateY(10px);animation:fadeIn .6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.loader{position:fixed;inset:0;background:rgba(248,250,249,.9);backdrop-filter:blur(12px);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.loader.hidden{opacity:0;pointer-events:none}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-val{font-size:3rem;font-weight:300;color:var(--esc-950);letter-spacing:-.02em}
.section-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--esc-900);margin-bottom:.5rem}
.gold-line{width:3rem;height:2px;background:var(--gold-500);border-radius:2px}
.quote-card{padding:1rem;border-left:2px solid var(--esc-200);margin-bottom:1rem}
.quote-card p{font-size:.875rem;color:#4B5563;font-style:italic;line-height:1.6;margin-bottom:.5rem}
.quote-card .meta{font-size:.65rem;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.1em}
.dark-card{background:var(--esc-800);color:#fff;border:1px solid rgba(255,255,255,.05)}
.dark-card:hover{background:var(--esc-900)}
.tbl-wrap{max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{position:sticky;top:0;background:#fff;padding:.75rem 1rem;text-align:left;font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid #E5E7EB;z-index:5}
td{padding:.75rem 1rem;border-bottom:1px solid #F3F4F6;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:#F9FAFB}
.badge{display:inline-flex;align-items:center;padding:.15rem .6rem;border-radius:999px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
.badge-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
.btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.5rem;background:var(--gold-500);color:var(--esc-950);border:none;border-radius:999px;font-size:.875rem;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(170,138,74,.3)}
.btn-gold:hover{background:var(--gold-400);box-shadow:0 0 25px rgba(170,138,74,.5);transform:translateY(-1px)}
.btn-outline{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1);border-radius:999px;font-size:.875rem;font-weight:500;cursor:pointer;backdrop-filter:blur(4px);transition:all .3s}
.btn-outline:hover{background:rgba(255,255,255,.1)}

/* ===== LOGIN GATE STYLES ===== */
#loginGate{position:fixed;inset:0;background:var(--esc-900);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
#loginGate::before{content:'';position:absolute;top:-20%;left:-10%;width:50%;height:150%;background:var(--esc-800);border-radius:50%;filter:blur(120px);opacity:.4}
#loginGate::after{content:'';position:absolute;bottom:-30%;right:-10%;width:60%;height:120%;background:var(--esc-950);border-radius:50%;filter:blur(100px);opacity:.6}
.login-box{position:relative;z-index:1;background:#fff;border-radius:1.5rem;padding:2.5rem;max-width:400px;width:90%;box-shadow:0 25px 80px -12px rgba(0,0,0,.4);text-align:center}
.login-box img{height:56px;margin-bottom:1.25rem}
.login-box h2{font-family:'Playfair Display',serif;color:var(--esc-900);font-size:1.5rem;margin-bottom:.25rem}
.login-box .subtitle{font-size:.85rem;color:#6B7280;margin-bottom:2rem}
.login-input{width:100%;padding:.85rem 1rem;border:1.5px solid #E5E7EB;border-radius:12px;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--esc-500)}
.login-input+.login-input{margin-top:.75rem}
.login-btn{width:100%;padding:.85rem;margin-top:1.25rem;background:var(--esc-800);color:#fff;border:none;border-radius:999px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.login-btn:hover{background:var(--esc-600)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{color:#DC2626;font-size:.8rem;margin-top:.75rem;display:none;background:#FEF2F2;padding:.5rem .75rem;border-radius:8px}
.login-footer{position:relative;z-index:1;margin-top:1.5rem;font-size:.7rem;color:var(--esc-300);letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- LOGIN GATE — se muestra primero, se oculta al autenticarse   -->
<!-- ============================================================ -->
<div id="loginGate">
  <div class="login-box">
    <img src="https://hospitalescandon.org/img/core-img/logo.png" alt="Hospital Escandón" onerror="this.style.display='none'">
    <h2>Dashboard Ejecutivo</h2>
    <p class="subtitle">Acceso exclusivo para administradores</p>
    <input id="loginEmail" type="email" placeholder="Correo electrónico" class="login-input" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    <input id="loginPass" type="password" placeholder="Contraseña" class="login-input" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" id="loginBtn" class="login-btn">Iniciar sesión</button>
    <p id="loginError" class="login-error"></p>
  </div>
  <p class="login-footer">Fundación María Ana Mier de Escandón I.A.P.</p>
</div>

<!-- ============================================================ -->
<!-- DASHBOARD — todo el contenido original (oculto hasta login)  -->
<!-- ============================================================ -->
<div id="dashboardContent" style="display:none">

<div class="loader" id="loader">
  <div style="position:relative;width:64px;height:64px;margin-bottom:1.5rem">
    <svg class="spin" style="width:100%;height:100%;color:var(--esc-200)" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 20"/></svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--esc-800)"><i class="ph ph-star-four" style="font-size:1.25rem"></i></div>
  </div>
  <h2 style="font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--esc-900)">Hospital Escandón</h2>
  <p style="font-size:.8rem;color:var(--esc-600);margin-top:.5rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase">Sincronizando datos</p>
</div>

<div class="hero-bg"></div>

<div style="position:relative;z-index:10;max-width:1600px;margin:0 auto;padding:2rem 1.5rem 5rem;display:flex;flex-direction:column">

  <!-- HEADER -->
  <header style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4rem" class="fade-in" data-delay="0.1s">
    <div style="display:flex;align-items:center;gap:1.5rem">
      <img src="https://hospitalescandon.org/img/core-img/logo.png" alt="HE" style="height:48px;border-radius:8px" onerror="this.style.display='none'">
      <div>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.75rem;color:#fff;letter-spacing:.02em;margin-bottom:.25rem">Hospital Escandón</h1>
        <div style="display:flex;align-items:center;gap:.75rem">
          <span style="font-size:.7rem;color:var(--esc-300);font-weight:500;letter-spacing:.15em;text-transform:uppercase">Dashboard ejecutivo médico</span>
          <div style="width:4px;height:4px;border-radius:50%;background:var(--gold-500)"></div>
          <span style="font-size:.7rem;color:var(--esc-300);display:flex;align-items:center;gap:.35rem" id="lastUpdateTime"><i class="ph ph-clock"></i>Cargando...</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:.75rem;align-items:center">
      <!-- NOMBRE DEL ADMIN + LOGOUT -->
      <span id="adminName" style="font-size:.8rem;color:var(--esc-300);font-weight:500"></span>
      <button class="btn-outline" onclick="doLogout()" style="padding:.4rem 1rem;font-size:.75rem"><i class="ph ph-sign-out"></i>Salir</button>
      <button class="btn-outline" onclick="loadData()"><i class="ph ph-arrows-clockwise"></i>Actualizar</button>
      <button class="btn-gold" onclick="exportAllCSV()"><i class="ph ph-download-simple" style="font-size:1.1rem"></i>Exportar reporte</button>
    </div>
  </header>

  <!-- KPIs -->
  <section style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:3rem" class="fade-in" id="statsCards"></section>

  <!-- CHARTS -->
  <div class="fade-in" style="margin-bottom:3rem">
    <div style="margin-bottom:2rem"><h2 class="section-title">Análisis cuantitativo</h2><div class="gold-line"></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.5rem" id="chartsArea"></div>
  </div>

  <!-- OPEN TEXT -->
  <div class="fade-in" style="margin-bottom:3rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2rem">
      <div><h2 class="section-title">Síntesis cualitativa directiva</h2><div class="gold-line"></div></div>
      <div style="background:#fff;border:1px solid var(--esc-100);padding:.35rem 1rem;border-radius:999px;display:flex;align-items:center;gap:.5rem">
        <div style="width:6px;height:6px;border-radius:50%;background:var(--gold-500)"></div>
        <span style="font-size:.65rem;font-weight:700;color:var(--esc-800);text-transform:uppercase;letter-spacing:.1em">Extractos curados</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem" id="openTexts"></div>
  </div>

  <!-- TABLE -->
  <div class="fade-in">
    <div style="margin-bottom:1.5rem"><h2 class="section-title">Registro detallado</h2><div class="gold-line"></div></div>
    <div class="premium-card" style="overflow:hidden">
      <div class="tbl-wrap" id="tableArea"></div>
    </div>
  </div>

</div>
</div><!-- fin dashboardContent -->

<script>
var SUPABASE_URL='https://gggwswbgwihlokrnvktl.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdnZ3dzd2Jnd2lobG9rcm52a3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjMwMjksImV4cCI6MjA4OTg5OTAyOX0.hyjmonvNM3b9aK4tM8hJGQv7ZF1-1absbczxUwiTCUg';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
var allData=[];

// ============================================================
// AUTH: LOGIN / SESSION / LOGOUT
// ============================================================
async function doLogin(){
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  var errEl=document.getElementById('loginError');
  var btn=document.getElementById('loginBtn');
  errEl.style.display='none';

  if(!email||!pass){errEl.textContent='Ingresa correo y contraseña';errEl.style.display='block';return}

  btn.disabled=true;btn.textContent='Verificando...';

  var res=await sb.auth.signInWithPassword({email:email,password:pass});

  if(res.error){
    errEl.textContent='Credenciales incorrectas';errEl.style.display='block';
    btn.disabled=false;btn.textContent='Iniciar sesión';return;
  }

  // Verificar que sea admin registrado
  var adminRes=await sb.from('admin_users').select('role,display_name').eq('id',res.data.user.id).single();

  if(adminRes.error||!adminRes.data){
    errEl.textContent='No tienes permisos de administrador';errEl.style.display='block';
    await sb.auth.signOut();
    btn.disabled=false;btn.textContent='Iniciar sesión';return;
  }

  // Login exitoso — mostrar dashboard
  showDashboard(adminRes.data.display_name);
}

function showDashboard(name){
  document.getElementById('loginGate').style.display='none';
  document.getElementById('dashboardContent').style.display='block';
  document.getElementById('adminName').textContent=name;
  loadData().then(function(){
    document.getElementById('loader').classList.add('hidden');
  });
  setTimeout(function(){document.getElementById('loader').classList.add('hidden')},5000);
  document.querySelectorAll('.fade-in').forEach(function(el,i){el.style.animationDelay=(i*.15)+'s'});
}

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}

// Revisar si ya hay sesión activa (para no pedir login cada vez)
async function checkSession(){
  var sess=await sb.auth.getSession();
  if(sess.data.session){
    var adminRes=await sb.from('admin_users').select('role,display_name').eq('id',sess.data.session.user.id).single();
    if(adminRes.data){
      showDashboard(adminRes.data.display_name);
      return;
    }
  }
  // No hay sesión válida — el login gate ya está visible
}

// ============================================================
// DASHBOARD: funciones originales (sin cambios)
// ============================================================
async function loadData(){
  var res=await sb.from('respuestas_encuesta').select('*').order('created_at',{ascending:false});
  if(res.error){alert('Error: '+res.error.message);return}
  allData=res.data||[];
  document.getElementById('lastUpdateTime').innerHTML='<i class="ph ph-clock"></i> Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  renderStats();renderCharts();renderOpenTexts();renderTable();
}

function renderStats(){
  var n=allData.length;
  var avgP73=n?(allData.reduce(function(s,r){return s+(r.p7_3_probabilidad_aumentar||0)},0)/n).toFixed(1):'—';
  var lf=['p3_1_reputacion','p3_2_calidad_precio','p3_3_infraestructura','p3_4_recomienda','p3_5_satisfaccion_pacientes','p3_6_vs_corta_estancia'];
  var ls=0,lc=0;allData.forEach(function(r){lf.forEach(function(f){if(r[f]){ls+=r[f];lc++}})});
  var avgP=lc?(ls/lc).toFixed(1):'—';
  var hf=['p5_1_habitaciones','p5_2_limpieza','p5_3_enfermeria_piso','p5_4_alimentos','p5_5_familiares','p5_6_admision_alta','p5_7_imagen_general'];
  var hs=0,hc=0;allData.forEach(function(r){hf.forEach(function(f){if(r[f]){hs+=r[f];hc++}})});
  var avgH=hc?(hs/hc).toFixed(1):'—';
  var hi=n?allData.filter(function(r){return r.p5_10_hoteleria_influye&&(r.p5_10_hoteleria_influye.indexOf('Probablemente')>-1||r.p5_10_hoteleria_influye.indexOf('Definitivamente')>-1)}).length:0;
  var hp=n?Math.round(hi/n*100):0;
  var c=document.getElementById('statsCards');
  c.innerHTML='<div class="premium-card" style="padding:1.5rem;position:relative;overflow:hidden"><div style="position:absolute;top:0;right:0;width:8rem;height:8rem;background:var(--esc-50);border-radius:0 0 0 100%;opacity:.5"></div><div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><h3 style="font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.12em">Respuestas totales</h3><div style="width:2.5rem;height:2.5rem;border-radius:50%;background:var(--esc-50);display:flex;align-items:center;justify-content:center;color:var(--esc-800)"><i class="ph ph-users" style="font-size:1.1rem"></i></div></div><span class="kpi-val">'+n+'</span></div>'
  +'<div class="premium-card" style="padding:1.5rem"><div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><h3 style="font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.12em">Prob. aumentar Cx</h3><div style="width:2.5rem;height:2.5rem;border-radius:50%;background:var(--esc-50);display:flex;align-items:center;justify-content:center;color:var(--esc-800)"><i class="ph ph-stethoscope" style="font-size:1.1rem"></i></div></div><span class="kpi-val">'+avgP73+'</span><span style="font-size:1rem;color:#9CA3AF;font-weight:500;margin-left:.25rem">/ 10</span></div>'
  +'<div class="premium-card" style="padding:1.5rem"><div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><h3 style="font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.12em">Percepción gral</h3><div style="width:2.5rem;height:2.5rem;border-radius:50%;background:var(--gold-50);display:flex;align-items:center;justify-content:center;color:var(--gold-600)"><i class="ph-fill ph-star" style="font-size:1.1rem"></i></div></div><span class="kpi-val">'+avgP+'</span><span style="font-size:1rem;color:#9CA3AF;font-weight:500;margin-left:.25rem">/ 5</span></div>'
  +'<div class="premium-card" style="padding:1.5rem;border:1px solid '+(parseFloat(avgH)<3?'#FECACA':'rgba(21,65,53,.05)')+'"><div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><h3 style="font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.12em">Hotelería promedio</h3><div style="width:2.5rem;height:2.5rem;border-radius:50%;background:#FEF2F2;display:flex;align-items:center;justify-content:center;color:#DC2626"><i class="ph ph-buildings" style="font-size:1.1rem"></i></div></div><span class="kpi-val">'+avgH+'</span><span style="font-size:1rem;color:#9CA3AF;font-weight:500;margin-left:.25rem">/ 5</span></div>'
  +'<div class="premium-card" style="padding:1.5rem;background:linear-gradient(135deg,#fff,#FEF2F2)"><div style="display:flex;justify-content:space-between;margin-bottom:1.5rem"><h3 style="font-size:.65rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.12em;line-height:1.5">Impacto fuga<br>x hotelería</h3><div style="width:2.5rem;height:2.5rem;border-radius:50%;background:#fff;border:1px solid #FECACA;display:flex;align-items:center;justify-content:center;color:#DC2626"><i class="ph ph-sign-out" style="font-size:1.1rem"></i></div></div><span class="kpi-val" style="color:'+(hp>30?'#DC2626':'var(--esc-950)')+'">'+hp+'%</span></div>';
}

function countField(field){var counts={};allData.forEach(function(r){var v=r[field];if(!v)return;var items=typeof v==='string'&&v.indexOf(';')>-1?v.split(';').map(function(s){return s.trim()}):[String(v)];items.forEach(function(item){if(item)counts[item]=(counts[item]||0)+1})});return counts}

function renderCharts(){
  var area=document.getElementById('chartsArea');area.innerHTML='';
  var cfgs=[
    {title:'¿Dónde más operan?',sub:'Distribución competencia',field:'p7_1_otras_instituciones',type:'bar'},
    {title:'Razones de desvío',sub:'Factores de decisión',field:'p2_3_razones_otros',type:'bar'},
    {title:'Antigüedad en HE',sub:'Años de relación',field:'p1_2_anos_adscrito',type:'doughnut'},
    {title:'% Práctica en HE',sub:'Proporción de cirugías',field:'p1_4_porcentaje_he',type:'doughnut'},
    {title:'Costo quirófano',sub:'Importancia asignada',field:'p8_1_importancia_costo',type:'doughnut'},
    {title:'Cambio de mayor impacto',sub:'Acciones prioritarias',field:'p9_2_cambio_impacto',type:'bar'},
    {title:'Incentivos atractivos',sub:'Programas preferidos',field:'p8_2_incentivos_atractivos',type:'bar'},
    {title:'Hotelería influye en fuga',sub:'Impacto directo',field:'p5_10_hoteleria_influye',type:'doughnut'}
  ];
  var colors=['#154135','#438070','#8FBCAE','#AA8A4A','#BDA46D','#2F6557','#BBD6CB','#D1C49C','#75562E','#245145'];
  cfgs.forEach(function(cfg,i){
    var counts=countField(cfg.field);if(Object.keys(counts).length===0)return;
    var labels=Object.keys(counts);var values=Object.values(counts);
    var card=document.createElement('div');card.className='premium-card';card.style.padding='1.5rem';card.style.display='flex';card.style.flexDirection='column';
    card.innerHTML='<div style="margin-bottom:1rem"><h4 style="font-size:.95rem;font-weight:600;color:#111827">'+cfg.title+'</h4><p style="font-size:.8rem;color:#9CA3AF;margin-top:.25rem">'+cfg.sub+'</p></div><div style="flex:1;position:relative;min-height:240px"><canvas id="ch'+i+'"></canvas></div>';
    area.appendChild(card);
    new Chart(document.getElementById('ch'+i),{
      type:cfg.type==='doughnut'?'doughnut':'bar',
      data:{labels:labels.map(function(l){return l.length>30?l.slice(0,30)+'...':l}),datasets:[{data:values,backgroundColor:cfg.type==='doughnut'?colors.slice(0,labels.length):['#154135'],borderWidth:cfg.type==='doughnut'?2:0,borderColor:'#fff',borderRadius:cfg.type==='bar'?6:0,barPercentage:.6,cutout:cfg.type==='doughnut'?'75%':undefined}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:cfg.type==='bar'?'y':undefined,plugins:{legend:{display:cfg.type==='doughnut',position:'bottom',labels:{usePointStyle:true,boxWidth:6,font:{size:11,family:'Inter'},padding:16,color:'#6B7280'}},tooltip:{backgroundColor:'#154135',titleColor:'#fff',bodyColor:'#DDECE7',padding:12,cornerRadius:8,titleFont:{size:13,weight:'600'},bodyFont:{size:13},displayColors:false}},scales:cfg.type==='bar'?{x:{grid:{color:'#F3F4F6',drawBorder:false},border:{display:false},beginAtZero:true},y:{grid:{display:false},ticks:{font:{size:11}}}}:undefined}
    });
  });
}

    {field:'p4_10_equipo_necesario',title:'Necesidades de equipo',icon:'ph-wrench',color:'var(--esc-50)',iconColor:'var(--esc-600)',border:'var(--esc-200)'},
    {field:'p5_11_mejora_experiencia',title:'Experiencia del paciente',icon:'ph-bed',color:'var(--esc-50)',iconColor:'var(--esc-600)',border:'var(--esc-200)'},
    {field:'p6_7_barrera_frustrante',title:'Barreras administrativas',icon:'ph-file-dashed',color:'#FEF2F2',iconColor:'#DC2626',border:'#FECACA'},
    {field:'p7_4_que_necesita',title:'Requisitos para más Cx',icon:'ph-trend-up',color:'var(--gold-50)',iconColor:'var(--gold-600)',border:'var(--gold-400)'},

    }else{
      card.className='premium-card';card.style.padding='1.5rem';
      card.innerHTML='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem"><div style="width:2rem;height:2rem;border-radius:50%;background:'+cfg.color+';display:flex;align-items:center;justify-content:center;color:'+cfg.iconColor+'"><i class="ph '+cfg.icon+'" style="font-size:1.1rem"></i></div><h4 style="font-weight:500;color:#111827">'+cfg.title+' ('+items.length+')</h4></div>'+items.slice(0,2).map(function(it){return'<div class="quote-card" style="border-color:'+cfg.border+'"><p>'+it.text+'</p><span class="meta">'+it.spec+' — '+it.date+'</span></div>'}).join('');
    }

}

function renderTable(){
  if(!allData.length){document.getElementById('tableArea').innerHTML='<p style="padding:2rem;color:#9CA3AF;text-align:center">No hay respuestas aún.</p>';return}
  var cols=['created_at','p1_1_especialidad','p1_2_anos_adscrito','p2_1_cirugias_total','p2_2_cirugias_he','p7_3_probabilidad_aumentar','p5_10_hoteleria_influye','p9_2_cambio_impacto'];
  var headers=['Fecha','Especialidad','Antigüedad','Cx Total','Cx HE','Prob.','Riesgo fuga','Cambio clave'];
  var html='<table><thead><tr>'+headers.map(function(h){return'<th>'+h+'</th>'}).join('')+'</tr></thead><tbody>';
  allData.forEach(function(r){
    html+='<tr>';
    cols.forEach(function(c){
      var v=r[c]||'—';
      if(c==='created_at')v=new Date(v).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
      if(c==='p7_3_probabilidad_aumentar'&&v!=='—'){
        var num=parseInt(v);
        if(num>=8)v='<span class="badge badge-success">'+v+'</span>';
        else if(num<=4)v='<span class="badge badge-danger">'+v+'</span>';
      }
      if(c==='p5_10_hoteleria_influye'&&v!=='—'){
        if(v.indexOf('Definitivamente s')>-1||v.indexOf('Probablemente s')>-1)v='<span class="badge badge-danger">Alto riesgo</span>';
        else if(v.indexOf('Definitivamente no')>-1)v='<span class="badge badge-success">Bajo riesgo</span>';
      }
      if(c==='p1_1_especialidad')html+='<td style="font-weight:600;color:#111827">'+v+'</td>';
      else html+='<td title="'+String(r[c]||'').replace(/"/g,'&quot;')+'">'+v+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tableArea').innerHTML=html;
}

function exportAllCSV(){
  if(!allData.length){alert('No hay datos');return}
  var keys=Object.keys(allData[0]).filter(function(k){return k!=='id'&&k!=='user_agent'});
  var csv=keys.join(',')+'\n';
  allData.forEach(function(r){csv+=keys.map(function(k){return'"'+String(r[k]||'').replace(/"/g,'""')+'"'}).join(',')+'\n'});
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='Reporte_HE_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}
